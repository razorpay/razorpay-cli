root = "."
tmp_dir = "tmp"

[build]
# Build whichever binary is requested via AIR_BIN (defaults to user).
# Build with -gcflags='all=-N -l' to disable optimizations for debugging
cmd = "AIR_BIN=${AIR_BIN:-user}; go build -gcflags='all=-N -l' -o ./tmp/${AIR_BIN} ./cmd/${AIR_BIN}"

# Run binary via dlv exec.
# Air supports 'full_bin' to override the entire run command.
# Added --continue so the app starts running automatically instead of waiting for a debugger to attach.
full_bin = "dlv exec --headless --listen=:2345 --api-version=2 --accept-multiclient --continue --log ./tmp/${AIR_BIN:-user} --"
include_ext = [
    "go",
    "tpl",
    "tmpl",
    "html",
    "toml",
    "yaml",
    "yml",
    "json",
    "proto",
]
exclude_dir = ["tmp", "bin", ".git", ".tools", "build"]
delay = 1000
kill_delay = 500
poll = true
poll_interval = 2000 # Poll every 2 seconds

[log]
time = true
