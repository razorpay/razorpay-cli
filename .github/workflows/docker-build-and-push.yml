name: Docker Build and Push

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

env:
  REGISTRY: c.rzp.io
  REPO_PREFIX: fnd

jobs:
  # =============================================================================
  # Build: Build and push architecture-specific images
  # =============================================================================
  # Runs 4 jobs in parallel (2 platforms × 2 binaries)
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux-amd64
          - linux-arm64
        binary:
          - user
    name: Build ${{ matrix.binary }} (${{ matrix.platform }})
    runs-on:
      - non-api
      - ${{ matrix.platform }}
    steps:
      - name: Generate GitHub Token
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42
        id: app-token
        with:
          app-id: ${{ secrets.WORKFLOWGATEKEEPER_APP_ID }}
          private-key: ${{ secrets.WORKFLOWGATEKEEPER_PRIVATEKEY }}
          owner: "razorpay"

      - name: Build and Push Image
        uses: razorpay/actions/docker-image-build-push@master
        with:
          username: ${{ secrets.HARBOR_DOCKER_USERNAME }}
          password: ${{ secrets.HARBOR_DOCKER_PASSWORD }}
          registry: ${{ env.REGISTRY }}
          repository: ${{ env.REPO_PREFIX }}-${{ matrix.binary }}
          enable-login: true
          push: true
          platforms: ${{ matrix.platform == 'linux-amd64' && 'linux/amd64' || 'linux/arm64' }}
          # Use same tag logic as manifest step to ensure consistency
          custom-tag: ${{ github.event.pull_request.head.sha || github.sha }}-${{ matrix.platform == 'linux-amd64' && 'amd64' || 'arm64' }}
          build-args: |
            REGISTRY=${{ env.REGISTRY }}/razorpay
            ARG_BIN=${{ matrix.binary }}
          secrets: |
            git_token=${{ steps.app-token.outputs.token }}
          full-setup: true

  # =============================================================================
  # Create Manifest: Combine arch-specific images into multiarch manifest
  # =============================================================================
  # Runs 2 jobs in parallel (1 per binary) after all builds complete
  create-manifest:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        binary:
          - user
    name: Create Manifest ${{ matrix.binary }}
    runs-on:
      - non-api
      - X64
    steps:
      - name: Create Multiarch Manifest
        uses: razorpay/actions/docker-image-build-push@master
        with:
          username: ${{ secrets.HARBOR_DOCKER_USERNAME }}
          password: ${{ secrets.HARBOR_DOCKER_PASSWORD }}
          registry: ${{ env.REGISTRY }}
          repository: ${{ env.REPO_PREFIX }}-${{ matrix.binary }}
          enable-login: true
          # Final manifest tag (SHA without suffix)
          custom-tag: ${{ github.event.pull_request.head.sha || github.sha }}
          trigger-multiarch-image-build: true
          # Suffixes to combine into manifest
          multiarch-suffixes: |
            -amd64
            -arm64
          full-setup: true

  # =============================================================================
  # Status: Report combined workflow status
  # =============================================================================
  workflow-status:
    name: Workflow Status
    needs: [create-manifest]
    if: always()
    runs-on:
      - non-api
      - X64
    steps:
      - name: Check for failures
        id: check
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Update Status Check - Failure
        if: steps.check.outputs.status == 'failure'
        run: |
          echo "❌ Workflow failed"
          curl --fail -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: token ${{ github.token }}" \
            -d '{"state":"failure","context":"github/combined-status-check","description":"Docker build and push failed","target_url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha || github.sha }}"
          exit 1

      - name: Update Status Check - Success
        if: steps.check.outputs.status == 'success'
        run: |
          echo "✅ Workflow succeeded"
          curl --fail -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: token ${{ github.token }}" \
            -d '{"state":"success","context":"github/combined-status-check","description":"Docker build and push succeeded","target_url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha || github.sha }}"
          exit 0
