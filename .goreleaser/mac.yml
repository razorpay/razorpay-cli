version: 2

env:
  - GO111MODULE=on

before:
  hooks:
    - go mod download

project_name: razorpay

builds:
  - id: razorpay-darwin-amd64
    binary: razorpay
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - darwin
    goarch:
      - amd64

  - id: razorpay-darwin-arm64
    binary: razorpay
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - darwin
    goarch:
      - arm64

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_mac-os_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - none*

checksum:
  name_template: "{{ .ProjectName }}-mac-checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

snapshot:
  version_template: "{{ .Version }}-next"

release:
  disable: true

blobs:
  - provider: s3
    region: ap-south-1
    bucket: rzp-1018-nonprod-betasite.razorpay.com
    directory: "cli/{{ .Version }}"

