version: v2
modules:
  - path: proto
    lint:
      use:
        - BASIC
        - COMMENTS
        - FILE_LOWER_SNAKE_CASE
      except:
        - COMMENT_FIELD
        - PACKAGE_VERSION_SUFFIX
    breaking:
      use:
        - FILE
deps:
  - buf.build/googleapis/googleapis
  - buf.build/bufbuild/protovalidate:v0.13.4
lint:
  use:
    - STANDARD
    - COMMENT_ENUM
    - COMMENT_ENUM_VALUE
    - COMMENT_FIELD
    - COMMENT_MESSAGE
    - COMMENT_ONEOF
    - COMMENT_RPC
    - COMMENT_SERVICE
  except:
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    - SERVICE_SUFFIX
    - PACKAGE_VERSION_SUFFIX
