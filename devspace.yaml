# =============================================================================
# DevSpace Configuration for Foundation Service
# =============================================================================
# This file configures DevSpace for hot-reload development against remote pods.
#
# Usage:
#   1. Update the vars section with your devstack_label and service details
#   2. Run: devspace dev
#
# Prerequisites:
#   - kubectl configured with cluster access
#   - DevSpace CLI installed (https://devspace.sh)
# =============================================================================

version: v1beta11

# =============================================================================
# Variables - Update these for your environment
# =============================================================================
vars:
  # Your devstack label (must match kube-manifests deployment)
  - name: DEVSTACK_LABEL
    value: "your-devstack-label"

  # Kubernetes namespace
  - name: NAMESPACE
    value: "foundation-service"

  # Application name (used in pod labels)
  - name: APP_NAME
    value: "foundation-service"

  # Devstack image with CompileDaemon and Delve
  - name: DEVSTACK_IMAGE
    value: "c.rzp.io/razorpay/foundation-service:devstack"

dev:
  # ---------------------------------------------------------------------------
  # Pod Replacement - Swap deployed pod with dev-enabled image
  # ---------------------------------------------------------------------------
  replacePods:
    # API/Web Pod
    - labelSelector:
        name: ${APP_NAME}-${DEVSTACK_LABEL}
      replaceImage: ${DEVSTACK_IMAGE}
      patches:
        - op: replace
          path: spec.containers[0].readinessProbe.periodSeconds
          value: 100
        - op: replace
          path: spec.containers[0].livenessProbe.periodSeconds
          value: 100
        - op: replace
          path: spec.containers[0].readinessProbe.initialDelaySeconds
          value: 30
        - op: replace
          path: spec.containers[0].imagePullPolicy
          value: "Always"
      namespace: ${NAMESPACE}

    # Uncomment to enable worker pod replacement
    # - labelSelector:
    #     name: ${APP_NAME}-worker-${DEVSTACK_LABEL}
    #   replaceImage: ${DEVSTACK_IMAGE}
    #   patches:
    #     - op: replace
    #       path: spec.containers[0].readinessProbe.periodSeconds
    #       value: 100
    #     - op: replace
    #       path: spec.containers[0].livenessProbe.periodSeconds
    #       value: 100
    #     - op: replace
    #       path: spec.containers[0].readinessProbe.initialDelaySeconds
    #       value: 30
    #     - op: replace
    #       path: spec.containers[0].imagePullPolicy
    #       value: "Always"
    #   namespace: ${NAMESPACE}

  # ---------------------------------------------------------------------------
  # File Sync - Sync local changes to remote pod
  # ---------------------------------------------------------------------------
  sync:
    # API/Web Pod sync
    - labelSelector:
        name: ${APP_NAME}-${DEVSTACK_LABEL}
      localSubPath: ./
      containerPath: /src/
      excludePaths:
        - .git/
        - .idea/
        - .vscode/
        - bin/
        - tmp/
        - vendor/
        - "*.log"
      namespace: ${NAMESPACE}
      disableDownload: true
      initialSync: preferLocal
      waitInitialSync: true

    # Uncomment to enable worker pod sync
    # - labelSelector:
    #     name: ${APP_NAME}-worker-${DEVSTACK_LABEL}
    #   localSubPath: ./
    #   containerPath: /src/
    #   excludePaths:
    #     - .git/
    #     - .idea/
    #     - .vscode/
    #     - bin/
    #     - tmp/
    #     - vendor/
    #     - "*.log"
    #   namespace: ${NAMESPACE}
    #   disableDownload: true
    #   initialSync: preferLocal
    #   waitInitialSync: true

  # ---------------------------------------------------------------------------
  # Logs - Stream logs from remote pods
  # ---------------------------------------------------------------------------
  logs:
    showLast: 200
    sync: true
    selectors:
      - labelSelector:
          name: ${APP_NAME}-${DEVSTACK_LABEL}
        namespace: ${NAMESPACE}
      # Uncomment to stream worker logs
      # - labelSelector:
      #     name: ${APP_NAME}-worker-${DEVSTACK_LABEL}
      #   namespace: ${NAMESPACE}

  # ---------------------------------------------------------------------------
  # Port Forwarding - Forward ports from remote pod to localhost
  # ---------------------------------------------------------------------------
  # Uncomment to enable port forwarding for debugging
  # ports:
  #   - labelSelector:
  #       name: ${APP_NAME}-${DEVSTACK_LABEL}
  #     namespace: ${NAMESPACE}
  #     forward:
  #       - port: 8080  # gRPC
  #       - port: 8081  # HTTP/gRPC-Gateway
  #       - port: 8082  # Metrics
  #       - port: 2345  # Delve debugger
