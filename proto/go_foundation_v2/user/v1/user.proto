syntax = "proto3";

package go_foundation_v2.users.v1;

option go_package = "go_foundation_v2/users/v1;usersv1";

import "google/api/annotations.proto";
import "buf/validate/validate.proto";
import "go_foundation_v2/error/v1/error.proto";

// User represents a user entity with all its properties
message User {
  string id                               = 1;
  string username                         = 2;
  string password                         = 3;
  string email                            = 4;

  // embed the error struct
  go_foundation_v2.error.v1.Error error = 5;
}

// CreateRequest represents the request payload
// for creating a new user
message CreateRequest {
  string username = 1 [
    (buf.validate.field).string = {
      min_len: 4,
      max_len: 32
    },
    (buf.validate.field).required = true
  ];

  string password = 2 [
    (buf.validate.field).string = {
      min_len: 8,
      max_len: 32
    },
    (buf.validate.field).required = true
  ];

  optional string email = 3 [
    (buf.validate.field).string.email = true
  ];
}

// GetRequest represents the request payload 
// for getting a user
message GetRequest {
  string id = 1 [
    (buf.validate.field).string = {
      // this supports both id as well as user_<id>
      min_len: 14,
      max_len: 19
    },
    (buf.validate.field).required = true
  ];
}

// UserService represents rpc service defining the 
// RPC functions for User entity
service UserService {
  rpc Create(CreateRequest) returns (User) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "*"
    };
  }

  rpc Get(GetRequest) returns (User) {
    option (google.api.http) = {
      get: "/v1/users/{id}"
    };
  }
}
